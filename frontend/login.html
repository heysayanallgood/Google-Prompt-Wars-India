<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraVOS | Authentication Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="./assets/css/animations.css">
    <link rel="stylesheet" href="./assets/css/login.css">
</head>
<body class="auth-page-body">

    <!-- Cinematic Background -->
    <div class="global-bg-fx">
        <div class="glow-orb cyan"></div>
        <div class="glow-orb violet"></div>
        <div class="glow-orb orange"></div>
    </div>

    <!-- Navigation Overlay -->
    <div class="glass-nav-container">
        <nav class="glass-nav">
            <div class="nav-logo">Aura<span>VOS</span></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="technology.html">The Tech</a>
                <a href="dashboard.html">Live Dashboard</a>
                <a href="stadium-map.html">Stadium Map</a>
                <a href="social-hub.html">Social Hub</a>
                <a href="case-studies.html">Case Studies</a>
                <a href="backend-console.html">Developer API</a>
                <a href="biometric-scan.html">Biometric Kiosk</a>
                <a href="contestant-registry.html">Contestant Registry</a>
            </div>
            <div style="display: flex; gap: 0.75rem; align-items: center;">
                <a href="login.html" class="nav-cta active" style="background: rgba(255,255,255,0.1);">Login</a>
                <button class="nav-cta">Request Demo</button>
            </div>
        </nav>
    </div>

    <!-- Main Auth Section -->
    <main class="page-container auth-page">
        <div class="auth-container fade-in">
            <div class="auth-card" id="authCard">
                <header class="auth-header" style="text-align: center;">
                    <h2 id="authTitle" style="font-size: 1.75rem; color: var(--text-primary);">Vault Access</h2>
                    <p id="authSubtitle" style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.5rem;">Secure entry to AuraVOS ecosystem.</p>
                </header>

                <div class="auth-toggle">
                    <div class="toggle-slider"></div>
                    <button id="toggleLogin" class="active">Login</button>
                    <button id="toggleRegister">Register</button>
                </div>

                <!-- Login/Register Form -->
                <form id="authForm" class="auth-form" novalidate>
                    <div class="form-group">
                        <label for="email">E-Mail Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="operator@auravos.io" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Security Protocol (Password)</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div id="registerOnlyFields" style="display: none; flex-direction: column; gap: 1.25rem;">
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Protocol</label>
                            <div class="input-wrapper">
                                <input type="password" id="confirmPassword" placeholder="••••••••">
                            </div>
                        </div>
                    </div>

                    <div class="auth-submit">
                        <button type="submit" class="primary-btn" style="width: 100%;">Establish Auth Tunnel</button>
                    </div>
                </form>

                <!-- SSO Gateway -->
                <div class="sso-gateway">
                    <div class="sso-divider">Or continue with</div>
                    <div class="sso-grid">
                        <button class="sso-btn google-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Google
                        </button>
                        <button class="sso-btn github-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                            GitHub
                        </button>
                        <button class="sso-btn linkedin-btn">
                            <svg viewBox="0 0 24 24" fill="#0077b5"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                            LinkedIn
                        </button>
                        <button class="sso-btn yahoo-btn">
                            <svg viewBox="0 0 24 24" fill="#6001d2"><path d="M2.5 1h5.8l4.4 7.6L17.1 1h5.3l-7.3 11v9.6h-5.4V12L2.5 1z"/></svg>
                            Yahoo
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="global-footer">
        <div class="footer-bottom">
            <span>© 2026 AuraVOS Systems Inc.</span>
            <div class="footer-legal">
                <a href="#">Privacy Protocol</a>
                <a href="#">Terms</a>
            </div>
        </div>
    </footer>

    <script src="./assets/js/main.js" defer></script>
</body>
</html>
